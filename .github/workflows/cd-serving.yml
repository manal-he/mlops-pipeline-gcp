name: CD - Deploy Serving API

on:
  push:
    branches: [main]
    paths:
      - "src/serving/**"

jobs:
  deploy-serving:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/mlops-docker/ml-prediction-api:latest \
            -f src/serving/Dockerfile .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/mlops-docker/ml-prediction-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ml-prediction-api \
            --image=${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/mlops-docker/ml-prediction-api:latest \
            --region=${{ secrets.REGION }} \
            --platform=managed \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --set-env-vars="MODEL_URI=gs://${{ secrets.ARTIFACTS_BUCKET }}/models/latest/,PROJECT_ID=${{ secrets.PROJECT_ID }}" \
            --service-account=${{ secrets.SA_EMAIL }}
